<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autodiagnóstico McClelland P5 — GRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --logro: #1D9E75; --poder: #7F77DD; --afil: #D85A30;
      --bg: #FAFAF8; --surface: #FFFFFF; --border: #E8E6E0;
      --text: #1C1B19; --text-muted: #6B6860; --accent: #2E2D2A;
      --radius: 12px;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    
    /* Progress Bar Sticky */
    .top-progress {
      position: sticky; top: 0; width: 100%; height: 5px;
      background: var(--border); z-index: 1000;
    }
    #progressBar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }

    .main { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: 36px; margin-bottom: 10px; }
    .hero p { color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }

    .item-card { 
      background: var(--surface); border: 1px solid var(--border); 
      border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
      transition: transform 0.2s ease;
    }
    .item-situation { font-size: 15px; font-weight: 500; margin-bottom: 15px; line-height: 1.5; }
    
    .scale-btns { display: flex; gap: 8px; }
    .btn-val { 
      flex: 1; height: 40px; border: 1px solid var(--border); 
      background: var(--bg); cursor: pointer; border-radius: 6px;
      font-weight: 500; transition: all 0.2s;
    }
    .btn-val:hover { border-color: var(--text); }
    .btn-val.selected { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }

    /* Feedback P5 Styles */
    .results-box { display: none; margin-top: 40px; animation: fadeIn 0.5s ease forwards; }
    .feedback-p5 { 
      background: #fdfdfd; border-left: 4px solid var(--accent); 
      padding: 25px; border-radius: 8px; margin-top: 20px; 
    }
    .feedback-p5 h3 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 15px; }
    .risk-analysis { margin-top: 15px; padding: 15px; background: #fff5f5; border-radius: 6px; font-size: 14px; }
    .critical-q { margin-top: 15px; font-style: italic; color: var(--text); font-weight: 500; border-top: 1px solid var(--border); padding-top: 10px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .btn-calc { 
      width: 100%; padding: 16px; background: var(--text); color: white; 
      border: none; border-radius: var(--radius); cursor: pointer; font-size: 16px;
    }
  </style>
</head>
<body>

<div class="top-progress"><div id="progressBar"></div></div>

<main class="main">
  <section class="hero">
    <h1>Autodiagnóstico de Motivación</h1>
    <p>Sitúate en cada escenario de gestión y selecciona qué tan identificado te sientes con la reacción descrita. No busques la respuesta "correcta", busca tu impulso natural.</p>
  </section>

  <div id="quizContainer"></div>

  <button class="btn-calc" id="btnCalc">Ver mi Perfil de Gestión</button>

  <section class="results-box" id="resultsBox">
    <div id="feedbackContainer"></div>
    <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #ccc; padding:10px; width:100%; cursor:pointer; border-radius:8px;">Reiniciar Evaluación</button>
  </section>
</main>

<script>
  const SITUACIONES = [
    { id: 'logro-0', dim: 'logro', txt: "Tras un éxito rotundo, dedicas tus horas libres a desglosar métricas para entender qué falló para no haber alcanzado la perfección absoluta." },
    { id: 'logro-1', dim: 'logro', txt: "Al elegir un nuevo reto, rechazas lo muy fácil o lo imposible; prefieres aquel donde el éxito dependa al 100% de tu capacidad técnica." },
    { id: 'logro-2', dim: 'logro', txt: "Exiges a tu superior KPIs numéricos diarios porque necesitas saber, minuto a minuto, si hoy eres mejor gestor de lo que fuiste ayer." },
    { id: 'poder-0', dim: 'poder', txt: "En una reunión caótica donde nadie decide nada, sientes la urgencia natural de tomar el mando, asignar tareas y ser la autoridad." },
    { id: 'poder-1', dim: 'poder', txt: "Priorizas reuniones con directivos de alto nivel para asegurar que tu visión prevalezca en la estrategia de la organización a largo plazo." },
    { id: 'poder-2', dim: 'poder', txt: "Sientes una gratificación profunda cuando logras que un colega opositor termine aceptando tu postura como la única correcta." },
    { id: 'afil-0', dim: 'afil', txt: "Inviertes la última hora del viernes en integrar al equipo para que todos estén felices, incluso si dejas pendiente la planificación operativa." },
    { id: 'afil-1', dim: 'afil', txt: "Decides no dar un feedback correctivo a un colaborador cercano para evitar que la armonía del grupo o la relación de confianza se deterioren." },
    { id: 'afil-2', dim: 'afil', txt: "Si te enteras de una reunión informal de trabajo a la que no fuiste invitado, tu motivación cae al percibir que no eres parte del círculo de confianza." }
  ];

  const FEEDBACK_P5 = {
    logro: {
      titulo: "Perfil Dominante: Necesidad de Logro (nAch)",
      desc: "Eres un ejecutor de estándares excepcionales. Tu motor es la excelencia técnica y la superación de récords personales.",
      riesgo: "Análisis P5: Tu riesgo es el 'agotamiento por perfección'. Al centrarte tanto en el resultado medible, puedes ver a los demás como obstáculos si no rinden a tu nivel. En cargos directivos, esto se traduce en dificultad para delegar y una tendencia a la microgestión.",
      pregunta: "¿Cómo podrías redefinir el éxito para que incluya el desarrollo de otros y no solo tu producción individual?"
    },
    poder: {
      titulo: "Perfil Dominante: Necesidad de Poder (nPow)",
      desc: "Eres un motor de influencia. Te sientes cómodo en el centro de la toma de decisiones y dirigiendo el rumbo estratégico.",
      riesgo: "Análisis P5: Si tu poder no es 'socializado' (orientado al bien común), puedes generar entornos de sumisión donde el talento se silencia. Tu riesgo es convertirte en un cuello de botella donde nada avance sin tu validación personal.",
      pregunta: "¿Estás usando tu influencia para empoderar a tu equipo o para asegurar que tu voz sea la única que se escuche?"
    },
    afil: {
      titulo: "Perfil Dominante: Necesidad de Afiliación (nAff)",
      desc: "Eres el pegamento de la organización. Priorizas la cultura, el bienestar y la cohesión del equipo por sobre cualquier métrica fría.",
      riesgo: "Análisis P5: Tu mayor riesgo es la 'evitación del conflicto necesario'. Al temer dañar el vínculo, puedes permitir mediocres desempeños o postergar decisiones difíciles, lo que a largo plazo erosiona la autoridad y los resultados del área.",
      pregunta: "¿Qué es más costoso para el equipo: una conversación incómoda hoy o un fracaso operativo mañana por falta de feedback?"
    }
  };

  let scores = JSON.parse(localStorage.getItem('scores_mcc')) || {};

  function renderQuiz() {
    const container = document.getElementById('quizContainer');
    SITUACIONES.forEach(s => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `<div class="item-situation">${s.txt}</div>`;
      
      const btnGroup = document.createElement('div');
      btnGroup.className = 'scale-btns';
      
      for(let i=1; i<=5; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn-val';
        btn.textContent = i;
        if(scores[s.id] === i) btn.classList.add('selected');
        
        btn.onclick = () => {
          scores[s.id] = i;
          localStorage.setItem('scores_mcc', JSON.stringify(scores));
          Array.from(btnGroup.children).forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updateProgress();
        };
        btnGroup.appendChild(btn);
      }
      card.appendChild(btnGroup);
      container.appendChild(card);
    });
    updateProgress();
  }

  function updateProgress() {
    const answered = Object.keys(scores).length;
    document.getElementById('progressBar').style.width = (answered / 9 * 100) + '%';
  }

  document.getElementById('btnCalc').onclick = () => {
    if(Object.keys(scores).length < 9) return alert("Por favor, responde a todas las situaciones antes de continuar.");
    
    const totals = { logro: 0, poder: 0, afil: 0 };
    SITUACIONES.forEach(s => totals[s.dim] += scores[s.id]);
    
    const dominant = Object.keys(totals).reduce((a, b) => totals[a] > totals[b] ? a : b);
    const f = FEEDBACK_P5[dominant];
    
    document.getElementById('feedbackContainer').innerHTML = `
      <div class="feedback-p5">
        <h3>${f.titulo}</h3>
        <p>${f.desc}</p>
        <div class="risk-analysis">
          <strong>Análisis de Riesgo Organizacional:</strong><br>${f.riesgo}
        </div>
        <div class="critical-q">
          <strong>Pregunta de Reflexión Crítica:</strong><br>${f.pregunta}
        </div>
      </div>
    `;
    document.getElementById('resultsBox').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  };

  renderQuiz();
</script>
</body>
</html>
