<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Necesidades McClelland — GRO</title>
  <meta name="description" content="Instrumento de autodiagnóstico basado en la Teoría de las Necesidades de McClelland. Identifica tu necesidad dominante: logro, poder o afiliación.">
  <meta property="og:title" content="Perfil de Necesidades McClelland">
  <meta property="og:description" content="Autodiagnóstico motivacional · Logro · Poder · Afiliación">
  <meta property="og:type" content="sitio-web">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════
       TOKENS — CONTRASTE MEJORADO
    ═══════════════════════════════════════ */
    :root {
      --logro:       #1D9E75;
      --logro-50:    #E1F5EE;
      --logro-100:   #9FE1CB;
      --logro-200:   #5DCAA5;
      --logro-700:   #0F6E56;
      --logro-900:   #04342C;

      --poder:       #7F77DD;
      --poder-50:    #EEEDFE;
      --poder-100:   #CECBF6;
      --poder-200:   #AFA9EC;
      --poder-700:   #534AB7;
      --poder-900:   #26215C;

      --afil:        #D85A30;
      --afil-50:     #FAECE7;
      --afil-100:    #F5C4B3;
      --afil-200:    #F0997B;
      --afil-700:    #993C1D;
      --afil-900:    #4A1B0C;

      --neutral-50:  #F7F6F3;
      --neutral-100: #EEECEA;
      --neutral-200: #DDDBD7;
      --neutral-300: #CBC9C5;  /* NUEVO: para bordes */
      --neutral-400: #6B6A67;  /* ANTES: #9A9790 */
      --neutral-600: #3D3C3A;  /* ANTES: #5C5A57 */
      --neutral-900: #1C1B18;

      --surface:     #FFFFFF;
      --bg:          #F4F3F0;

      --r-lg: 14px;
      --r-md: 9px;
      --r-sm: 5px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--neutral-900);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--neutral-200);
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .course-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neutral-600);
    }
    .vsep { width: 1px; height: 16px; background: var(--neutral-200); }
    .topbar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--neutral-600);
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .progress-wrap { display: flex; align-items: center; gap: 9px; }
    .progress-track {
      width: 88px; height: 3px;
      background: var(--neutral-200);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: var(--neutral-900);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .progress-txt { font-size: 11px; font-weight: 500; color: var(--neutral-600); min-width: 30px; text-align: right; }
    .phase-pill {
      font-size: 10px; font-weight: 500;
      padding: 4px 12px; border-radius: 20px;
      background: var(--neutral-100);
      color: var(--neutral-600);
      border: 1px solid var(--neutral-200);
    }

    .main { max-width: 860px; margin: 0 auto; padding: 56px 24px 96px; }

    .hero { margin-bottom: 48px; }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neutral-600);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(32px, 5.5vw, 46px);
      font-weight: 400; line-height: 1.1;
      color: var(--neutral-900);
      margin-bottom: 10px;
    }
    .hero h1 em { font-style: italic; color: var(--neutral-600); }

    .dim-rule {
      display: flex; gap: 0; margin: 22px 0 22px;
      height: 3px; width: 96px; border-radius: 2px; overflow: hidden;
    }
    .dim-rule span { flex: 1; }
    .dr-logro { background: var(--logro); }
    .dr-poder { background: var(--poder); }
    .dr-afil  { background: var(--afil); }

    .hero-desc {
      font-size: 15px;
      color: var(--neutral-600);
      line-height: 1.78;
      max-width: 560px;
    }

    .hero-meta {
      display: flex; gap: 8px; margin-top: 22px; flex-wrap: wrap;
    }
    .meta-chip {
      font-size: 11px;
      font-weight: 500;
      color: var(--neutral-600);
      background: var(--surface);
      border: 1px solid var(--neutral-200);
      padding: 5px 13px; border-radius: 20px;
    }

    .instruccion {
      display: flex; gap: 14px; align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--neutral-200);
      border-radius: var(--r-lg);
      padding: 18px 22px;
      margin-bottom: 40px;
    }
    .instr-icon { flex-shrink: 0; margin-top: 2px; color: var(--neutral-600); }
    .instruccion p {
      font-size: 14px;
      color: var(--neutral-600);
      line-height: 1.68;
    }
    .instruccion strong { color: var(--neutral-900); font-weight: 600; }

    .dimension { margin-bottom: 20px; }

    .dim-header {
      display: flex; align-items: center; gap: 11px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--neutral-200);
      border-bottom: none;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
    }
    .dim-stripe { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
    .ds-logro { background: var(--logro); }
    .ds-poder { background: var(--poder); }
    .ds-afil  { background: var(--afil); }

    .dim-name { font-size: 14px; font-weight: 600; color: var(--neutral-900); flex: 1; }
    .dim-meta { display: flex; align-items: center; gap: 8px; }
    .dim-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--neutral-600);
    }
    .dim-code {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: var(--r-sm);
      background: var(--neutral-100);
      color: var(--neutral-600);
      border: 1px solid var(--neutral-200);
    }

    .dim-items {
      background: var(--surface);
      border: 1px solid var(--neutral-200);
      border-radius: 0 0 var(--r-lg) var(--r-lg);
    }

    .item {
      padding: 22px 22px 20px;
      border-bottom: 1px solid var(--neutral-100);
      transition: background 0.16s;
    }
    .item:last-child { border-bottom: none; }
    .item.done { background: #FAFAF8; }

    .item-top {
      display: flex; gap: 12px; align-items: flex-start;
      margin-bottom: 18px;
    }
    .item-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--neutral-600);
      letter-spacing: 0.05em;
      padding-top: 1px;
      flex-shrink: 0;
      min-width: 44px;
    }
    .item-body { flex: 1; }

    .situacion {
      display: block;
      background: var(--neutral-50);
      border-left: 2px solid var(--neutral-400);
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--neutral-600);
      line-height: 1.65;
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-style: italic;
    }
    .pregunta {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--neutral-900);
      line-height: 1.6;
    }
    .reverso-badge {
      display: inline-block;
      background: var(--neutral-200);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 8px;
      color: var(--neutral-700);
      vertical-align: middle;
    }

    .scale-wrap { display: flex; align-items: center; gap: 10px; }
    .scale-lbl {
      font-size: 10px;
      font-weight: 500;
      color: var(--neutral-600);
      white-space: nowrap;
      min-width: 58px;
      line-height: 1.4;
    }
    .scale-lbl.r { text-align: right; }
    .scale-btns { display: flex; gap: 5px; flex: 1; }

    .bv {
      flex: 1; height: 38px;
      border: 1px solid var(--neutral-300);
      border-radius: var(--r-md);
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--neutral-600);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s, transform 0.08s;
    }
    .bv:hover {
      border-color: var(--neutral-400);
      color: var(--neutral-900);
      background: var(--surface);
    }
    .bv:active { transform: scale(0.94); }

    .bv.sel-logro { background: var(--logro-50); border-color: var(--logro-200); color: var(--logro-900); }
    .bv.sel-poder { background: var(--poder-50); border-color: var(--poder-200); color: var(--poder-900); }
    .bv.sel-afil  { background: var(--afil-50);  border-color: var(--afil-200);  color: var(--afil-900); }

    .aviso {
      font-size: 13px;
      font-weight: 500;
      color: #791F1F;
      padding: 11px 16px; margin-top: 14px;
      background: #FCEBEB;
      border: 1px solid #F09595;
      border-radius: var(--r-md);
      display: none;
    }
    .aviso.show { display: block; }

    .btn-calcular {
      display: block; width: 100%;
      padding: 15px; margin-top: 22px;
      background: var(--neutral-900); color: var(--bg);
      border: none; border-radius: var(--r-lg);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer; letter-spacing: 0.01em;
      transition: opacity 0.14s, transform 0.08s;
    }
    .btn-calcular:hover { opacity: 0.85; }
    .btn-calcular:active { transform: scale(0.995); }

    .resultados {
      margin-top: 44px;
      display: none;
    }
    .resultados.visible {
      display: block;
      animation: slideUp 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .res-bloque {
      background: var(--surface);
      border: 1px solid var(--neutral-200);
      border-radius: var(--r-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .res-head {
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--neutral-100);
    }
    .res-head h2 {
      font-family: 'Fraunces', serif;
      font-size: 22px; font-weight: 400;
      color: var(--neutral-900);
      margin-bottom: 3px;
    }
    .res-head p {
      font-size: 12px;
      color: var(--neutral-600);
    }

    .scores-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--neutral-100);
    }
    .score-cell {
      padding: 18px 16px; text-align: center;
      border-right: 1px solid var(--neutral-100);
    }
    .score-cell:last-child { border-right: none; }
    .sc-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sc-logro .sc-label { color: var(--logro-700); }
    .sc-poder .sc-label { color: var(--poder-700); }
    .sc-afil  .sc-label { color: var(--afil-700); }

    .sc-val {
      font-family: 'Fraunces', serif;
      font-size: 30px; font-weight: 300;
      line-height: 1; margin-bottom: 4px;
    }
    .sc-logro .sc-val { color: var(--logro-900); }
    .sc-poder .sc-val { color: var(--poder-900); }
    .sc-afil  .sc-val { color: var(--afil-900); }

    .sc-of { font-size: 11px; }
    .sc-logro .sc-of { color: var(--logro-700); }
    .sc-poder .sc-of { color: var(--poder-700); }
    .sc-afil  .sc-of { color: var(--afil-700); }

    .nivel-pill {
      display: inline-block; margin-top: 7px;
      font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      border: 1px solid;
    }
    .niv-muy-alto  { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
    .niv-alto      { background: #EAF3DE; color: #27500A; border-color: #97C459; }
    .niv-mod-alto  { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
    .niv-moderado  { background: #FAEEDA; color: #633806; border-color: #FAC775; }
    .niv-mod-bajo  { background: #FAECE7; color: #712B13; border-color: #F0997B; }
    .niv-bajo      { background: #FCEBEB; color: #791F1F; border-color: #F09595; }

    .barras-section { padding: 22px 26px; border-bottom: 1px solid var(--neutral-100); }
    .bar-row {
      display: grid;
      grid-template-columns: 108px 1fr 56px;
      align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-lbl {
      font-size: 13px;
      font-weight: 500;
      color: var(--neutral-600);
    }
    .bar-track {
      height: 9px; background: var(--neutral-100);
      border-radius: 5px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 5px; width: 0%;
      transition: width 0.75s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bf-logro { background: var(--logro); }
    .bf-poder { background: var(--poder); }
    .bf-afil  { background: var(--afil); }
    .bar-score {
      font-size: 13px;
      font-weight: 600;
      color: var(--neutral-900);
      text-align: right;
    }

    .sesgo-aviso {
      margin: 0 26px;
      padding: 12px 16px;
      background: #FFF3E0;
      border-left: 4px solid #FF9800;
      border-radius: var(--r-md);
      font-size: 13px;
      color: #633806;
      display: none;
    }
    .sesgo-aviso.show { display: block; margin-bottom: 16px; }

    .empate-aviso {
      margin: 0 26px;
      padding: 11px 15px;
      background: #FAEEDA;
      border: 1px solid #EF9F27;
      border-radius: var(--r-md);
      font-size: 13px;
      color: #633806;
      display: none;
    }
    .empate-aviso.show { display: block; margin-bottom: 16px; }

    .perfil-section { padding: 20px 26px; border-bottom: 1px solid var(--neutral-100); }
    .perfil-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral-600);
      margin-bottom: 12px;
    }
    .perfil-card {
      padding: 20px 22px;
      border-radius: var(--r-md);
      border: 1px solid;
    }
    .pc-logro     { background: var(--logro-50); border-color: var(--logro-200); }
    .pc-poder     { background: var(--poder-50); border-color: var(--poder-200); }
    .pc-afil      { background: var(--afil-50);  border-color: var(--afil-200); }
    .pc-mixto     { background: #F5F4FF; border-color: var(--poder-200); }
    .pc-equilibrado { background: var(--neutral-50); border-color: var(--neutral-200); }

    .perfil-titulo {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .pc-logro .perfil-titulo     { color: var(--logro-900); }
    .pc-poder .perfil-titulo     { color: var(--poder-900); }
    .pc-afil  .perfil-titulo     { color: var(--afil-900); }
    .pc-mixto .perfil-titulo     { color: var(--poder-900); }
    .pc-equilibrado .perfil-titulo { color: var(--neutral-900); }

    .perfil-desc {
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 16px;
    }
    .pc-logro .perfil-desc     { color: var(--logro-700); }
    .pc-poder .perfil-desc     { color: var(--poder-700); }
    .pc-afil  .perfil-desc     { color: var(--afil-700); }
    .pc-mixto .perfil-desc     { color: var(--poder-700); }
    .pc-equilibrado .perfil-desc { color: var(--neutral-600); }

    .perfil-divider { height: 1px; background: rgba(0,0,0,0.08); margin-bottom: 16px; }

    .rec-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      opacity: 0.55;
      display: block;
      margin-bottom: 8px;
    }
    .perfil-rec {
      font-size: 13px;
      line-height: 1.75;
    }
    .pc-logro .perfil-rec     { color: var(--logro-700); }
    .pc-poder .perfil-rec     { color: var(--poder-700); }
    .pc-afil  .perfil-rec     { color: var(--afil-700); }
    .pc-mixto .perfil-rec     { color: var(--poder-700); }
    .pc-equilibrado .perfil-rec { color: var(--neutral-600); }

    .nota-section { padding: 18px 26px; border-bottom: 1px solid var(--neutral-100); }
    .nota-content {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--neutral-50);
      border: 1px solid var(--neutral-200);
      border-radius: var(--r-md);
      padding: 14px 16px;
    }
    .nota-icon { flex-shrink: 0; margin-top: 1px; color: var(--neutral-600); }
    .nota-content p {
      font-size: 13px;
      color: var(--neutral-600);
      line-height: 1.7;
    }
    .nota-content strong { color: var(--neutral-900); font-weight: 600; }

    .reflexion-section { padding: 20px 26px; border-bottom: 1px solid var(--neutral-100); }
    .ref-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--neutral-600);
      margin-bottom: 12px;
    }
    .reflexion-q {
      font-family: 'Fraunces',
